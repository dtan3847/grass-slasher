<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grass Slasher — Map Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; font-size: 13px; background: #1a1a1a; color: #ddd; padding: 16px; }
    h1 { font-size: 16px; margin-bottom: 10px; color: #fff; }
    #toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    #save-btn { padding: 5px 14px; background: #3a7bd5; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 13px; }
    #save-btn:hover { background: #2f68ba; }
    #save-btn:disabled { background: #555; cursor: not-allowed; }
    #status { color: #aaa; }
    #status.dirty { color: #f0c040; }
    #status.ok { color: #5cd65c; }
    #status.error { color: #e05555; }
    #panels { display: flex; gap: 28px; align-items: flex-start; }

    /* World grid */
    #world-container { flex-shrink: 0; }
    #world-container h2 { font-size: 13px; margin-bottom: 8px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    #world-grid {
      display: grid;
      grid-template-columns: 72px 14px 72px 14px 72px;
      grid-template-rows: 56px 14px 56px 14px 56px;
      gap: 0;
    }
    .room-cell {
      background: #2d2d2d;
      border: 2px solid #555;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      color: #ccc;
      font-size: 11px;
      transition: border-color 0.1s;
    }
    .room-cell:hover { border-color: #888; }
    .room-cell.selected { border-color: #3a7bd5; color: #fff; background: #253550; }

    .h-connector {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .h-connector-inner {
      width: 10px;
      height: 30px;
      border-radius: 2px;
      background: #444;
    }

    .v-connector {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .v-connector-inner {
      width: 30px;
      height: 10px;
      border-radius: 2px;
      background: #444;
    }

    .grid-spacer { }

    /* Paint mode selector */
    #paint-mode { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; font-size: 12px; color: #aaa; }
    #paint-mode label { display: flex; align-items: center; gap: 4px; cursor: pointer; color: #ccc; }
    #paint-mode input[type="radio"] { cursor: pointer; }

    /* Tile grid */
    #tile-container { flex-shrink: 0; }
    #tile-container h2 { font-size: 13px; margin-bottom: 8px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    #room-label { font-size: 11px; color: #888; margin-bottom: 6px; }
    #tile-grid {
      display: grid;
      grid-template-columns: repeat(10, 34px);
      grid-template-rows: repeat(8, 34px);
      gap: 2px;
    }
    .tile-cell {
      position: relative;
      cursor: pointer;
      border: 1px solid #3a3a3a;
      border-radius: 2px;
      overflow: hidden;
      width: 34px;
      height: 34px;
    }
    .tile-cell canvas {
      display: block;
      width: 34px;
      height: 34px;
    }
    .tile-cell:hover { opacity: 0.75; }
  </style>
</head>
<body>
  <h1>Grass Slasher — Map Editor</h1>
  <div id="toolbar">
    <button id="save-btn" disabled>Save</button>
    <span id="status">Loading...</span>
  </div>
  <div id="panels">
    <div id="world-container">
      <h2>World Map</h2>
      <div id="world-grid"></div>
    </div>
    <div id="tile-container">
      <h2>Room Tiles</h2>
      <div id="room-label"></div>
      <div id="paint-mode">
        Paint:
        <label><input type="radio" name="paint" value="empty"> Empty</label>
        <label><input type="radio" name="paint" value="grass" checked> Grass</label>
        <label><input type="radio" name="paint" value="rock"> Rock</label>
      </div>
      <div id="tile-grid"></div>
    </div>
  </div>

  <script type="module">
    import { paintShrub, paintRock } from '/src/sprites.js';

    let state = null;
    let selectedRoom = '1,2';
    let dirty = false;
    let paintMode = 'grass';

    const saveBtn = document.getElementById('save-btn');
    const statusEl = document.getElementById('status');

    document.querySelectorAll('input[name="paint"]').forEach(radio => {
      radio.addEventListener('change', e => { paintMode = e.target.value; });
    });

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = cls || '';
    }

    function markDirty() {
      dirty = true;
      saveBtn.disabled = false;
      setStatus('unsaved changes', 'dirty');
    }

    // ── World grid ────────────────────────────────────────────────────────────

    function renderWorldGrid() {
      const grid = document.getElementById('world-grid');
      grid.innerHTML = '';

      for (let gridRow = 1; gridRow <= 5; gridRow++) {
        for (let gridCol = 1; gridCol <= 5; gridCol++) {
          const el = document.createElement('div');
          el.style.gridColumn = gridCol;
          el.style.gridRow = gridRow;

          const isRoomCol = (gridCol % 2 === 1);
          const isRoomRow = (gridRow % 2 === 1);

          if (isRoomCol && isRoomRow) {
            const rx = (gridCol - 1) / 2;
            const ry = (gridRow - 1) / 2;
            const key = `${rx},${ry}`;
            el.className = 'room-cell' + (key === selectedRoom ? ' selected' : '');
            el.textContent = key;
            el.addEventListener('click', () => {
              selectedRoom = key;
              renderWorldGrid();
              renderTileGrid();
            });
          } else if (!isRoomCol && isRoomRow) {
            el.className = 'h-connector';
            el.innerHTML = `<div class="h-connector-inner"></div>`;
          } else if (isRoomCol && !isRoomRow) {
            el.className = 'v-connector';
            el.innerHTML = `<div class="v-connector-inner"></div>`;
          } else {
            el.className = 'grid-spacer';
          }

          grid.appendChild(el);
        }
      }
    }

    // ── Sprite helpers ────────────────────────────────────────────────────────

    const CELL_PX = 34;

    function makeTileCanvas(type) {
      const c = document.createElement('canvas');
      c.width  = CELL_PX;
      c.height = CELL_PX;
      const ctx = c.getContext('2d');
      const cx = CELL_PX / 2;
      const cy = CELL_PX / 2;

      if (type === 'empty') {
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(0, 0, CELL_PX, CELL_PX);
      } else if (type === 'grass') {
        ctx.fillStyle = '#2a4a2a';
        ctx.fillRect(0, 0, CELL_PX, CELL_PX);
        paintShrub(ctx, cx, cy, 110, false, 0.72);
      } else if (type === 'rock') {
        ctx.fillStyle = '#222';
        ctx.fillRect(0, 0, CELL_PX, CELL_PX);
        paintRock(ctx, cx, cy);
      }

      return c;
    }

    // ── Tile grid ─────────────────────────────────────────────────────────────

    function hasGrass(layout, col, row) {
      return layout.some(e => e.col === col && e.row === row);
    }

    function hasRock(rocks, col, row) {
      return rocks.some(e => e.col === col && e.row === row);
    }

    function paintTile(col, row) {
      const room = state.rooms[selectedRoom];

      // Remove from both arrays first
      const grassIdx = room.layout.findIndex(e => e.col === col && e.row === row);
      if (grassIdx >= 0) room.layout.splice(grassIdx, 1);

      const rockIdx = room.rocks.findIndex(e => e.col === col && e.row === row);
      if (rockIdx >= 0) room.rocks.splice(rockIdx, 1);

      // Add to the right array
      if (paintMode === 'grass') {
        room.layout.push({ col, row });
      } else if (paintMode === 'rock') {
        room.rocks.push({ col, row });
      }
      // 'empty' — already removed above, nothing to add

      markDirty();
      renderTileGrid();
    }

    function renderTileGrid() {
      const label = document.getElementById('room-label');
      const grid = document.getElementById('tile-grid');
      label.textContent = `Room ${selectedRoom}`;
      grid.innerHTML = '';

      const room = state.rooms[selectedRoom];
      if (!room) {
        label.textContent = `Room ${selectedRoom} — not found`;
        return;
      }

      const rocks = room.rocks ?? [];

      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 10; c++) {
          const el = document.createElement('div');
          el.className = 'tile-cell';
          el.title = `col ${c}, row ${r}`;

          let type = 'empty';
          if (hasRock(rocks, c, r))          type = 'rock';
          else if (hasGrass(room.layout, c, r)) type = 'grass';

          el.appendChild(makeTileCanvas(type));
          el.addEventListener('click', () => paintTile(c, r));
          grid.appendChild(el);
        }
      }
    }

    // ── Save ──────────────────────────────────────────────────────────────────

    saveBtn.addEventListener('click', () => {
      fetch('/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      })
        .then(r => r.json())
        .then(result => {
          if (result.ok) {
            const now = new Date();
            const hms = now.toTimeString().slice(0, 8);
            dirty = false;
            setStatus(`Saved OK at ${hms}`, 'ok');
          } else {
            setStatus('Save failed: ' + result.error, 'error');
          }
        })
        .catch(err => {
          setStatus('Save error: ' + err.message, 'error');
        });
    });

    // ── Init ──────────────────────────────────────────────────────────────────

    fetch('/world-data.json')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        state = data;
        saveBtn.disabled = false;
        setStatus('clean');
        renderWorldGrid();
        renderTileGrid();
      })
      .catch(err => {
        setStatus('Load failed: ' + err.message, 'error');
      });
  </script>
</body>
</html>
