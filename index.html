<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grass Slasher</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
    color: #eee;
    user-select: none;
  }
  #ui {
    display: flex;
    gap: 24px;
    padding: 8px 20px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 4px;
    margin-bottom: 6px;
    font-size: 14px;
  }
  #ui span { display: flex; align-items: center; gap: 4px; }
  canvas {
    display: block;
    image-rendering: pixelated;
    cursor: crosshair;
    border: 2px solid #333;
  }
  #shop {
    display: flex;
    gap: 6px;
    padding: 8px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 4px;
    margin-top: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #ccc;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 3px;
    font-family: monospace;
    font-size: 12px;
    transition: background 0.1s;
  }
  .btn:hover:not(:disabled) { background: #3a3a3a; border-color: #7c7; color: #fff; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.leveled { border-color: #5a5; }
  .btn.autoslash-on  { border-color: #7c7; background: #1a3a1a; color: #7f7; }
  .btn.autoslash-off { border-color: #744; background: #2a1a1a; color: #f77; }
  #hints {
    font-size: 11px;
    color: #555;
    margin-top: 6px;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

<div id="ui">
  <span>&#128142; <b id="gem-count">0</b></span>
  <span id="debt-display" style="margin-left:16px;color:#e8c84a;">Debt: 500 / 500</span>
</div>

<canvas id="game" width="640" height="480"></canvas>

<div id="shop">
  <button class="btn" id="btn-gems"     onclick="buyUpgrade('gemMult')">&#128142; +Yield Lv1 (10)</button>
  <button class="btn" id="btn-range"    onclick="buyUpgrade('slashRange')">&#128207; Sword Size Lv1 (20)</button>
  <button class="btn" id="btn-auto"     onclick="buyUpgrade('autoSlash')">&#129302; Auto-Slash Lv1 (50)</button>
  <button class="btn" id="btn-gemtier"   onclick="buyUpgrade('gemTier')">&#128081; Gem Tier Lv1 (30)</button>
  <button class="btn" id="btn-movespeed" onclick="buyUpgrade('moveSpeed')">&#128070; Move Speed Lv1 (25)</button>
  <button class="btn autoslash-on" id="btn-autoslash-toggle" onclick="toggleAutoSlash()">Auto-slash: ON</button>
</div>

<div id="hints">WASD / Arrows = move &nbsp;|&nbsp; SPACE or Z = slash &nbsp;|&nbsp; Grass regrows automatically</div>

<script src="bundle.js"></script>
</body>
</html>
